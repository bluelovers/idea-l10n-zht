DataSourceSchemasPanel.schema.pattern.hint = Syntax is <strong>db1:sc1,sc2|db2:sc3</strong><br><table cellpadding=0> <tr><td><strong>@</strong></td><td>\\&mdash; current database/schema</td></tr><tr><td><strong>*</strong></td><td>\\&mdash; every database/schema</td></tr></table>If only schemas supported, list them after <strong>*</strong><br>Examples:<table cellpadding=0><tr><td><strong>*:*</strong></td><td>\\&mdash; everything</td></tr><tr><td><strong>@:*</strong></td><td>\\&mdash; everything from current database</td></tr><tr><td><strong>@:@</strong></td><td>\\&mdash; current schema</td></tr></table><strong>*:dbo|@:@|db1:s1,s2,s3</strong> \\&mdash; schema <strong>dbo</strong> from all databases,<br> current schema and three schemas from <strong>db1</strong> database\n

